name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Set up Database (Turso LibSQL)
      run: |
        # In a real environment, you might push a schema to a local sqlite or use test tokens.
        # Here we just generate the Prisma client
        npx prisma generate
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      run: npx playwright test
      env:
        # Needed environment variables for tests
        JWT_SECRET: "test-jwt-secret-for-actions-only"
        # Optional: mock database or use SQLite for tests
        DATABASE_URL: "file:./test.db"
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
